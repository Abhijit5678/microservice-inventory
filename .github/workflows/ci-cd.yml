name: CI/CD Pipeline - Microservices

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - path: 'config-server'
            image_name: 'config-server'
          - path: 'api-gateway'
            image_name: 'api-gateway'
          - path: 'ProductService'
            image_name: 'product-service'
          - path: 'OrderService'
            image_name: 'order-service'
          - path: 'notificationservice'
            image_name: 'notification-service'

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Build JAR with Maven
      - name: Build with Maven (${{ matrix.path }})
        run: |
          cd ${{ matrix.path }}
          mvn clean package -DskipTests

      # 4. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build and Push Docker Image
      - name: Build and Push Docker Image (${{ matrix.image_name }})
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.path }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}:${{ github.sha }}